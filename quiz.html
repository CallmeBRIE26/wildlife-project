<div class="quiz-wrapper">

<div class="quiz-container">

<h1>Wildlife Quiz</h1>

<h3 id="question"></h3>

<div id="answers"></div>

</div>

</div>


<script>

const quiz = [

{
question:"Which animal is the tallest land animal?",
answers:["Elephant","Camel","Giraffe","Horse"],
correct:"Giraffe"
},

{
question:"Which animal is known as the King of the Jungle?",
answers:["Lion","Tiger","Bear","Wolf"],
correct:"Lion"
},

{
question:"Which animal is the fastest land animal?",
answers:["Horse","Cheetah","Tiger","Kangaroo"],
correct:"Cheetah"
},

{
question:"Which bird can mimic human speech?",
answers:["Parrot","Eagle","Owl","Falcon"],
correct:"Parrot"
},

{
question:"Which animal is the largest mammal?",
answers:["Elephant","Blue Whale","Shark","Giraffe"],
correct:"Blue Whale"
}

]

let current = 0
let score = 0

function loadQuestion(){

let q = quiz[current]

document.getElementById("question").innerText = q.question

let html=""

q.answers.forEach(ans=>{

html+=`<button onclick="answer('${ans}')">${ans}</button>`

})

document.getElementById("answers").innerHTML=html

}

function answer(ans){

if(ans===quiz[current].correct){
score++
}

current++

if(current<quiz.length){

loadQuestion()

}

else{

document.getElementById("question").innerHTML="Quiz Finished!"

document.getElementById("answers").innerHTML=
`<h2>Your Score: ${score}/${quiz.length}</h2>
<button onclick="location.reload()">Play Again</button>`

}

}

loadQuestion()

</script>
